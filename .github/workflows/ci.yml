name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        haxe-version:
          - stable
          - nightly
        target:
          - interp
          - node
          - neko
          - python
          - php
          - cpp
          - js
          - jvm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Cache Haxe
        uses: actions/cache@v6
        with:
          path: ~/haxe
          key: ${{ runner.os }}-haxe-${{ hashFiles('haxe_libraries/*') }}

      - name: Install Lix
        uses: lix-pm/setup-lix@master

      - name: Install Haxe
        run: lix install haxe ${{ matrix.haxe-version }}

      - name: Download Haxe and libraries
        run: lix download

      - name: Run Tests
        run: lix run travix ${{ matrix.target }}
